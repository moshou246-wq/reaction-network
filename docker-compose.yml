name: reaction

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reaction-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/reaction_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    networks:
      - reaction-network
    command: ["java", "-jar", "app.jar", "--spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reaction-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8080
    networks:
      - reaction-network

networks:
  reaction-network:
    driver: bridge
